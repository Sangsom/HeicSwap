name: CI

# Runs the test suite — including the zero-network-egress privacy guarantee
# (HeicSwapTests/NetworkEgressTests) — on every pull request, and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Provision placeholder secrets
        # Secrets.xcconfig is gitignored. The project's "generate secrets" build phase reads
        # .secrets (and otherwise tries to copy a non-committed example, which would fail), so
        # seed both files with empty keys. The RevenueCat / TelemetryDeck SDKs are keyless-safe
        # and no-op without real keys — exactly what the test run needs.
        run: |
          cp .secrets.example .secrets
          printf 'REVENUECAT_API_KEY =\nTELEMETRYDECK_APP_ID =\n' > Secrets.xcconfig

      - name: Set up Ruby + bundler
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run tests
        run: bundle exec fastlane test

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: build/test-output
          if-no-files-found: ignore
